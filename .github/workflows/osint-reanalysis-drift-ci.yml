name: OSINT Reanalysis Drift CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  osint-reanalysis-drift:
    runs-on: ubuntu-latest
    env:
      BASE_REPORT: "artifacts/osint_runs/batch_reanalysis_report_ci.json"
      CURRENT_REPORT: "artifacts/osint_runs/batch_reanalysis_report_ci_current.json"
      DRIFT_REPORT: "artifacts/osint_runs/reanalysis_drift_report_ci.json"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Re-run baseline case reanalysis in smart mode
        run: |
          set -euo pipefail
          if [ ! -f "$BASE_REPORT" ]; then
            echo "Base report missing: $BASE_REPORT"
            exit 1
          fi
          mkdir -p artifacts/osint_runs
          mapfile -t CASE_DIRS < <(
            python3 - "$BASE_REPORT" <<'PY'
import json
import sys

path = sys.argv[1]
with open(path, "r", encoding="utf-8") as f:
    data = json.load(f)

for result in data.get("results", []):
    case_dir = str(result.get("case_dir", "")).strip()
    if not case_dir:
        continue
    normalized = case_dir.replace("\\", "/").split("/")[-1]
    if normalized:
        print(normalized)
PY
          )

          if [ ${#CASE_DIRS[@]} -eq 0 ]; then
            echo "Base report has no case directories: $BASE_REPORT"
            exit 1
          fi

          CASE_ARGS=()
          for case_dir in "${CASE_DIRS[@]}"; do
            CASE_ARGS+=("--case-dir")
            CASE_ARGS+=("$case_dir")
          done

          python3 scripts/run_batch_osint_reanalysis.py \
            --osint-runs-dir artifacts/osint_runs \
            "${CASE_ARGS[@]}" \
            --smart \
            --out-report "$CURRENT_REPORT"

      - name: Compare against drift baseline and fail on drift
        run: |
          set -euo pipefail
          if [ ! -f "$BASE_REPORT" ]; then
            echo "Base report missing: $BASE_REPORT"
            exit 1
          fi

          python3 scripts/compare_reanalysis_reports.py \
            --base-report "$BASE_REPORT" \
            --current-report "$CURRENT_REPORT" \
            --out-report "$DRIFT_REPORT" \
            --max-event-delta 0.05 \
            --max-score-delta 2.0 \
            --max-signal-delta 1 \
            --strict-status
