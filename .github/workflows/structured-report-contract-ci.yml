name: Structured Report Contract CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-structured-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: |
          python scripts/run_structured_contract_pipeline.py --ci
